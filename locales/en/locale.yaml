email_subject: "Daily News Digest"

prompts:
  summarization:
    example_output: |-
      {{
        "perArticle":[{{"id":1,"oneLine":"..."}}]
      }}
    system: |-
      Task: output oneLine for each news item.
      oneLine: a single concise English line, clear and specific, keeping only the core information.
      Each oneLine must match its own item only. Do not reuse wording from another article and do not collapse similar articles into the same sentence.
      Output strict JSON only. No explanation, no Markdown.
    user: |-
      Please process the following {count} news items.
      Output format:
      {example_output}

      articles={articles_json}
  categorization:
    example_output: |-
      {{
        "perArticle":[{{"id":1,"category":"..."}}]
      }}
    category_language_instruction: "Category labels must be written in English."
    instructions:
      already_used_categories: "already_used_categories lists labels that earlier shards have already used; if one still fits, reuse it to keep the whole run consistent.\n"
    policies:
      with_candidates: |-
        Prefer using labels directly from {category_candidates_name}.
        Only create a new category when none of the labels in {category_candidates_name} fit.
        A new category should be short and generic, like a section name.
        Usually keep it to 1-3 words.
        Keep the total category count under {max_categories} when possible.
      with_candidates_and_used: |-
        Prefer using labels directly from {category_candidates_name}.
        If an already used category still fits, reuse it.
        Only create a new category when none of the labels in {category_candidates_name} fit.
        A new category should be short and generic, like a section name.
        Usually keep it to 1-3 words.
        Keep the total category count under {max_categories} when possible.
      without_candidates: |-
        Categories must be short and generic, like section names.
        Reuse an existing category when it still fits. Only create a new one when the existing categories clearly do not fit.
        Usually keep labels to 1-3 words.
        Keep the total category count under {max_categories} when possible.
    blocks:
      category_candidates: "{category_candidates_name}={category_candidates_json}\n"
      already_used_categories: "already_used_categories={used_categories_json}\n"
    system: |-
      Task: output exactly one category for each news item.
      Use the title and short content excerpt to judge the category.
      {category_language_instruction}
      {categorization_policy_instruction}
      {already_used_categories_instruction}
      The category must not be empty.
      Output strict JSON only. No explanation, no Markdown.
    user: |-
      Please process the following {count} news items.
      {category_candidates_block}{already_used_categories_block}Output format:
      {example_output}

      articles={articles_json}
  category_suggestion:
    example_output: |-
      {{
        "categories":["World","Markets","Tech"]
      }}
    category_language_instruction: "Category labels must be written in English."
    instructions:
      existing_categories: "existing_categories lists labels that earlier shards have already produced; if one still fits, reuse it to keep the whole run consistent.\n"
    policies:
      with_existing: |-
        If an existing category still fits, reuse it.
        Categories must be short and generic, like section names.
        Usually keep labels to 1-3 words.
        Keep the total category count under {max_categories} when possible.
      without_existing: |-
        Only keep the main recurring themes of this batch.
        Categories must be short and generic, like section names.
        Usually keep labels to 1-3 words.
        Keep the total category count under {max_categories} when possible.
    blocks:
      existing_categories: "existing_categories={existing_categories_json}\n"
    system: |-
      Task: propose a compact set of categories for this batch of news.
      Use the title and short content excerpt.
      {category_language_instruction}
      {category_suggestion_policy_instruction}
      {existing_categories_instruction}
      The category list must not be empty.
      Output strict JSON only. No explanation, no Markdown.
    user: |-
      Please process the following {count} news items.
      {existing_categories_block}Output format:
      {example_output}

      articles={articles_json}
  overview_headline:
    structured: |-
      Task: write line 1 of the news overview. Write in English even if articles are in other languages.
      Return JSON only: {{"headline":"..."}}
      Requirements:
      - Write exactly one line.
      - Mention at least one eye-catching specific event.
      - [id] references are forbidden.
      - Keep it natural, like the opening sentence of a real digest, not a title.
      - Keep it around {summary_target} characters when possible.
      - Output nothing except the JSON object.
    plain_text: |-
      Task: write line 1 of the news overview. Write in English even if articles are in other languages.
      Requirements:
      - Write exactly one line.
      - Mention at least one eye-catching specific event.
      - [id] references are forbidden.
      - Keep it natural, like the opening sentence of a real digest, not a title.
      - Keep it around {summary_target} characters when possible.
      - Do not output JSON.
      - No title, no explanation, no prefix or suffix.
    example_output: '{"headline":"<one-line overview>"}'
    plain_text_example_output: "<one-line overview>"
    user: |-
      Article count: {count}
      Please generate line 1 only.
      Output format:
      {example_output}

      articles={article_lines}
  overview_groups:
    structured: |-
      Task: continue the news overview from line 2 onward. Write in English even if articles are in other languages.
      Return JSON only: {{"groupLines":[...]}}
      Requirements:
      - Output 3-8 lines.
      - Each line must be one sentence and must not contain newline characters.
      - Continue naturally from the given headline. Do not write another all-day overview or repeat the headline.
      - Each line should synthesize 2-4 news items, not a list of themes or keywords.
      - Every line must end with [id] references; multiple references are allowed.
      - Prefer using 2 or more [id] references on most lines.
      - Keep each line around {summary_target} characters when possible.
      - Output nothing except the JSON object.
    plain_text: |-
      Task: continue the news overview from line 2 onward. Write in English even if articles are in other languages.
      Requirements:
      - Output 3-8 lines.
      - Each line must be one sentence and must not contain newline characters.
      - Continue naturally from the given headline. Do not write another all-day overview or repeat the headline.
      - Each line should synthesize 2-4 news items, not a list of themes or keywords.
      - Every line must end with [id] references; multiple references are allowed.
      - Prefer using 2 or more [id] references on most lines.
      - Keep each line around {summary_target} characters when possible.
      - No title, no explanation, no prefix or suffix.
    example_output: '{"groupLines":["<line 2>[1][2]","<line 3>[3][4]","<line 4>[5][6]"]}'
    user: |-
      Article count: {count}
      Valid reference id range: 1-{max_id}
      headline={headline}
      Please generate lines 2 onward.
      Output format:
      {example_output}

      articles={article_lines}

