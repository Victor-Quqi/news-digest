fallback:
  no_articles: "No qualifying news today."
  phase2_failed: "AI overview generation failed for this issue. The original article list is shown below."
  no_overview: "No overview available today."
  warning: "⚠ AI summarization/categorization failed for this issue. The current email is a degraded raw-article version."

overview_placeholders:
  - "Daily trend overview"
  - "Today trend overview"
  - "Trend overview"
  - "Overview"
  - "Summary"
