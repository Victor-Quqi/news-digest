email_subject: "Daily News Digest"
taxonomy:
  - "Tech"
  - "Finance"
  - "Policy"
  - "Market"
  - "International"
  - "Other"
default_category: "Other"

prompts:
  phase1:
    system: |-
      Task: output oneLine and category for each news item.
      oneLine: a single concise English line, clear and specific, keeping only the core information.
      Each oneLine must match its own item only. Do not reuse wording from another article and do not collapse similar articles into the same sentence.
      category: choose exactly 1, preferably from {taxonomy_text}; if none fits, you may use a more suitable custom category.
      Output strict JSON only. No explanation, no Markdown.
    user: |-
      Please process the following {count} news items.
      Available categories: {taxonomy_json}
      Output format:
      {example_output}

      articles={articles_json}
  phase2:
    structured: |-
      Task: generate a news overview from articles. Write in English even if articles are in other languages.
      Return JSON only: {{"summaryLines":[...]}}
      Requirements:
      - `summaryLines` must contain 5-9 strings.
      - Each string is exactly one line and must not contain newline characters.
      - The first string is the daily overview and must mention at least one eye-catching specific event; no [id].
      - From line 2 onward, each line should synthesize 2-4 news items into a complete sentence, not a list of themes or keywords, and end with [id] references; multiple references are allowed.
      - Keep each line around {summary_target} characters when possible.
      - Output nothing except the JSON object.
    plain_text: |-
      Task: generate the news overview as plain text from articles. Write in English even if articles are in other languages.
      Requirements:
      - 5-9 lines total.
      - Each line must not contain newline characters.
      - Line 1 is the daily overview and must mention at least one eye-catching specific event; no [id].
      - From line 2 onward, each line should synthesize 2-4 news items into a complete sentence, not a list of themes or keywords, and end with [id] references; multiple references are allowed.
      - Keep each line around {summary_target} characters when possible.
      - No title, no explanation, no prefix or suffix.
    example_output: '{"summaryLines":["Tension around Hormuz stayed high, and mixed US jobs and services data left oil, gold, and tech stocks more jumpy.","Iran said it struck a linked vessel and deployed a new air-defence system, while US intelligence signaled Hormuz tension was unlikely to ease soon and essential cargo ships were still allowed through.[1][3][6][57]"]}'
    user: |-
      Article count: {count}
      Valid reference id range: 1-{max_id}
      Please generate the overview.
      Output format:
      {example_output}

      articles={article_lines}

