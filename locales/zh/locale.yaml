email_subject: "新闻日报"

prompts:
  summarization:
    example_output: |-
      {{
        "perArticle":[{{"id":1,"oneLine":"..."}}]
      }}
    system: |-
      任务：为每篇新闻输出 oneLine。
      oneLine：中文单行，简洁明确，只保留核心信息。
      每条 oneLine 只能对应同 id 的原文，不要复用别条新闻的表述，不要把相似新闻写成同一句话。
      只输出严格 JSON，不要解释、不要 Markdown。
    user: |-
      请处理以下 {count} 篇新闻。
      输出格式：
      {example_output}

      articles={articles_json}
  categorization:
    example_output: |-
      {{
        "perArticle":[{{"id":1,"category":"..."}}]
      }}
    category_language_instruction: "分类名尽量用中文；AI、IPO、ETF 等常见缩写可保留。"
    instructions:
      already_used_categories: "already_used_categories 是前面分片已经用过的分类名；如果仍然贴切，优先复用以保持整批一致。\n"
    policies:
      with_candidates: |-
        优先直接使用 {category_candidates_name} 里的分类名。
        只有当 {category_candidates_name} 都不贴切时，才允许新建分类。
        新建分类也要简短、通用，像栏目名。
        最好 2~4 字，必要时可稍长。
        本批分类总数尽量少于 {max_categories} 个。
      with_candidates_and_used: |-
        优先直接使用 {category_candidates_name} 里的分类名。
        如果已有分类仍然贴切，优先复用已有分类。
        只有当 {category_candidates_name} 都不贴切时，才允许新建分类。
        新建分类也要简短、通用，像栏目名。
        最好 2~4 字，必要时可稍长。
        本批分类总数尽量少于 {max_categories} 个。
      without_candidates: |-
        分类名必须简短、通用，像栏目名。
        如果已有分类仍然贴切，优先复用；只有明显放不进去时才新建。
        最好 2~4 字，必要时可稍长。
        本批分类总数尽量少于 {max_categories} 个。
    blocks:
      category_candidates: "{category_candidates_name}={category_candidates_json}\n"
      already_used_categories: "already_used_categories={used_categories_json}\n"
    system: |-
      任务：为每篇新闻输出 1 个 category。
      可参考标题和正文片段判断。
      {category_language_instruction}
      {categorization_policy_instruction}
      {already_used_categories_instruction}
      category 不能为空。
      只输出严格 JSON，不要解释、不要 Markdown。
    user: |-
      请处理以下 {count} 篇新闻。
      {category_candidates_block}{already_used_categories_block}输出格式：
      {example_output}

      articles={articles_json}
  category_suggestion:
    example_output: |-
      {{
        "categories":["国际","财经","科技"]
      }}
    category_language_instruction: "分类名尽量用中文；AI、IPO、ETF 等常见缩写可保留。"
    instructions:
      existing_categories: "existing_categories 是前面分片已经产出的分类名；如果仍然贴切，优先复用以保持整批一致。\n"
    policies:
      with_existing: |-
        如果已有分类仍然贴切，优先复用。
        分类名必须简短、通用，像栏目名。
        最好 2~4 字，必要时可稍长。
        本批分类总数尽量少于 {max_categories} 个。
      without_existing: |-
        只保留这一批新闻里反复出现的主线。
        分类名必须简短、通用，像栏目名。
        最好 2~4 字，必要时可稍长。
        本批分类总数尽量少于 {max_categories} 个。
    blocks:
      existing_categories: "existing_categories={existing_categories_json}\n"
    system: |-
      任务：先为这一批新闻提炼一组建议分类。
      参考标题和短正文片段。
      {category_language_instruction}
      {category_suggestion_policy_instruction}
      {existing_categories_instruction}
      分类列表不能为空。
      只输出严格 JSON，不要解释、不要 Markdown。
    user: |-
      请处理以下 {count} 篇新闻。
      {existing_categories_block}输出格式：
      {example_output}

      articles={articles_json}
  overview_headline:
    structured: |-
      任务：只写新闻总览第1行。用中文撰写。
      只返回 JSON：{{"headline":"..."}}
      要求：
      - 只写 1 行。
      - 点出至少一个最吸引眼球的具体事件。
      - 禁止出现任何 `[id]` 引用。
      - 语气自然，像日报开头，不要写成标题。
      - 尽量控制在 {summary_target} 字左右。
      - 除 JSON 外不要输出任何内容。
    plain_text: |-
      任务：只写新闻总览第1行。用中文撰写。
      要求：
      - 只写 1 行。
      - 点出至少一个最吸引眼球的具体事件。
      - 禁止出现任何 `[id]` 引用。
      - 语气自然，像日报开头，不要写成标题。
      - 尽量控制在 {summary_target} 字左右。
      - 不要输出 JSON。
      - 不要输出标题、前后缀或解释。
    example_output: '{"headline":"<一句总述>"}'
    plain_text_example_output: "<一句总述>"
    user: |-
      文章数: {count}
      请只生成第1行。
      输出格式：
      {example_output}

      articles={article_lines}
  overview_groups:
    structured: |-
      任务：续写新闻总览第2行起。用中文撰写。
      只返回 JSON：{{"groupLines":[...]}}
      要求：
      - 输出 3-8 行。
      - 每行单独成句，不得换行。
      - 承接给定 headline 往下写，不要再写全天总述，不要重复 headline。
      - 每行归纳 2-4 条新闻，不要只列主题词或关键词。
      - 每行行尾都要附 `[id]` 引用，可多个。
      - 多数行尽量包含 2 个及以上 `[id]`。
      - 每行尽量控制在 {summary_target} 字左右。
      - 除 JSON 外不要输出任何内容。
    plain_text: |-
      任务：续写新闻总览第2行起。用中文撰写。
      要求：
      - 输出 3-8 行。
      - 每行单独成句，不得换行。
      - 承接给定 headline 往下写，不要再写全天总述，不要重复 headline。
      - 每行归纳 2-4 条新闻，不要只列主题词或关键词。
      - 每行行尾都要附 `[id]` 引用，可多个。
      - 多数行尽量包含 2 个及以上 `[id]`。
      - 每行尽量控制在 {summary_target} 字左右。
      - 不要输出标题、前后缀或解释。
    example_output: '{"groupLines":["<第2行>[1][2]","<第3行>[3][4]","<第4行>[5][6]"]}'
    user: |-
      文章数: {count}
      可引用 id 范围: 1-{max_id}
      headline={headline}
      请生成第2行起的总览。
      输出格式：
      {example_output}

      articles={article_lines}

