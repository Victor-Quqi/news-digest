email_subject: "新闻日报"
taxonomy:
  - "科技"
  - "金融"
  - "政策"
  - "市场"
  - "国际"
  - "其他"
default_category: "其他"

prompts:
  phase1:
    system: |-
      任务：为每篇新闻输出 oneLine 和 category。
      oneLine：中文单行，简洁明确，只保留核心信息。
      每条 oneLine 只能对应同 id 的原文，不要复用别条新闻的表述，不要把相似新闻写成同一句话。
      category：仅选 1 个，优先从 {taxonomy_text} 中选择；若都不贴切可自定义更合适分类。
      只输出严格 JSON，不要解释、不要 Markdown。
    user: |-
      请处理以下 {count} 篇新闻。
      可选 category: {taxonomy_json}
      输出格式：
      {example_output}

      articles={articles_json}
  phase2:
    system_json: |-
      任务：根据 articles 生成新闻总览。用中文撰写。
      只返回 JSON：{{"summaryLines":[...]}}
      要求：
      - `summaryLines` 是 5-9 个字符串。
      - 每个字符串对应一行，字符串内部不得出现换行符。
      - 第1个字符串写全天总述，点出至少一个最吸引眼球的具体事件，不带 `[id]`。
      - 第2个字符串起，每行归纳 2-4 条新闻，行尾附 `[id]` 引用，可多个。
      - 每行尽量控制在 {summary_target} 字左右。
      - 除 JSON 外不要输出任何内容。
    system_text: |-
      任务：根据 articles 输出新闻总览纯文本。用中文撰写。
      要求：
      - 共 5-9 行。
      - 每一行内部不得换行。
      - 第1行写全天总述，点出至少一个最吸引眼球的具体事件，不带 `[id]`。
      - 第2行起，每行归纳 2-4 条新闻，行尾附 `[id]` 引用，可多个。
      - 每行尽量控制在 {summary_target} 字左右。
      - 不要输出标题、前后缀或解释。
    example_output: '{"summaryLines":["第一行（总述，不带编号）","第二行（多条合并）...[1][3]"]}'
    user: |-
      文章数: {count}
      可引用 id 范围: 1-{max_id}
      请生成总览。
      输出格式：
      {example_output}

      articles={article_lines}

