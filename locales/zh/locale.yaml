  phase2_failed: "本期 AI 总览生成失败，以下为原文列表。"
  no_overview: "今日暂无可用总览。"
  warning: "⚠ 本期 AI 摘要/分类生成失败，当前邮件为原文列表降级版。"

overview_placeholders:
  - "全天趋势总述"
  - "今日趋势总述"
  - "趋势总述"
